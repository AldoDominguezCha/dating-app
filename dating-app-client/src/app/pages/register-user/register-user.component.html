<form class="register-user-form" [formGroup]="registerUserForm" autocomplete="off">
  <h2 class="text-center text-primary">Register</h2>
  <hr />
  <div class="mb-3 form-controls-container">
    <div class="p-inputgroup">
      <span class="p-inputgroup-addon"><i class="pi pi-user"></i></span>
      <input type="text" pInputText placeholder="Username" formControlName="username" />
    </div>
    <div class="p-inputgroup">
      <span class="p-inputgroup-addon"><i class="pi pi-key"></i></span>
      <input type="text" pInputText placeholder="Password" formControlName="password" />
    </div>
    <div class="form-buttons-container">
      <button pButton type="button" label="Submit" class="p-button-success" (click)="confirmRegistration()"></button>
      <button pButton type="button" label="Cancel" class="p-button-danger" (click)="onCancel()"></button>
    </div>
  </div>
</form>

<p-confirmDialog header="Confirmation" icon="pi pi-exclamation-triangle"></p-confirmDialog>

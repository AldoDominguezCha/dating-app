<h4 class="bg-primary" style="text-align: center">Internal Server Error</h4>
<ng-container *ngIf="error">
  <h5 class="text-danger">Error: {{ error.message }}</h5>
  <p style="font-weight: bold">Stack Trace:</p>
  <code class="mt-5" style="background-color: whitesmoke">
    {{ error.details }}
  </code>
</ng-container>

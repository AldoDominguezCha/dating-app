<ng-container>
  <button class="btn btn-outline-primary me-3" (click)="getNotFoundError()">Test Not Found Error</button>
  <button class="btn btn-outline-primary me-3" (click)="getBadRequestError()">Test Bad Request Error</button>
  <button class="btn btn-outline-primary me-3" (click)="getInternalServerError()">Test Internal Server Error</button>
  <button class="btn btn-outline-primary me-3" (click)="getUnauthError()">Test Unauth Error</button>
  <button class="btn btn-outline-primary me-3" (click)="getValidationBadRequestError()">Test Validation Bad Request Error</button>

  <div class="row mt-5" *ngIf="validationErrors.length > 0">
    <ul class="text-danger">
      <li *ngFor="let error of validationErrors">{{ error }}</li>
    </ul>
  </div>
</ng-container>
